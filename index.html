<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mason's Sound Shield v4.0</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        #statusIndicator { padding: 15px; border-radius: 8px; margin: 20px 0; font-weight: bold; transition: 0.3s; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; border-radius: 5px; border: none; }
    </style>
</head>
<body>

    <h1>Clinical Sound Shield</h1>
    
    <div id="statusIndicator" style="background: #334155;">Standby</div>

    <canvas id="visualizer" width="600" height="200" style="background: #1e293b; border-radius: 8px; width: 100%; max-width: 600px;"></canvas>

    <div id="playlist"></div>
    <button id="stopBtn" style="background: #ef4444; color: white;">STOP SYSTEM</button>

    <script src="app.js"></script>
</body>
</html>
